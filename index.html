<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live LaTeX Calculator</title>
  <meta name="description" content="A live LaTeX calculator powered by Pyodide and SymPy. Type math, see results instantly." />

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ════════════════════════════════════════════════════════════════
       CSS CUSTOM PROPERTIES  (dark default, light override)
    ════════════════════════════════════════════════════════════════ */
    :root {
      --bg:           #0b0b0e;
      --fg:           #dcdce8;
      --fg-dim:       rgba(220, 220, 232, 0.20);
      --fg-subtle:    rgba(220, 220, 232, 0.10);
      --divider:      rgba(220, 220, 232, 0.055);
      --caret-col:    #8b78ff;
      --caret-glow:   rgba(139, 120, 255, 0.50);
      --caret-err:    #ff6b6b;
      --caret-err-glow: rgba(255, 107, 107, 0.45);
      --pill-bg:      rgba(255, 255, 255, 0.055);
      --pill-border:  rgba(255, 255, 255, 0.09);
      --err:          #ff6b6b;
      --panel-bg:     rgba(11, 11, 16, 0.88);
      --panel-border: rgba(255, 255, 255, 0.07);
      --toggle-on:    #8b78ff;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg:           #f3f3f7;
      --fg:           #18182a;
      --fg-dim:       rgba(24, 24, 42, 0.22);
      --fg-subtle:    rgba(24, 24, 42, 0.08);
      --divider:      rgba(24, 24, 42, 0.07);
      --caret-col:    #5a48f0;
      --caret-glow:   rgba(90, 72, 240, 0.42);
      --caret-err:    #d03030;
      --caret-err-glow: rgba(208, 48, 48, 0.38);
      --pill-bg:      rgba(0, 0, 0, 0.045);
      --pill-border:  rgba(0, 0, 0, 0.09);
      --err:          #d03030;
      --panel-bg:     rgba(240, 240, 245, 0.92);
      --panel-border: rgba(0, 0, 0, 0.07);
      --toggle-on:    #5a48f0;
    }

    [data-theme="dracula"] {
      --bg:           #282a36;
      --fg:           #f8f8f2;
      --fg-dim:       rgba(248, 248, 242, 0.4);
      --fg-subtle:    rgba(248, 248, 242, 0.15);
      --divider:      rgba(248, 248, 242, 0.1);
      --caret-col:    #bd93f9;
      --caret-glow:   rgba(189, 147, 249, 0.5);
      --caret-err:    #ff5555;
      --caret-err-glow: rgba(255, 85, 85, 0.5);
      --pill-bg:      rgba(255, 255, 255, 0.05);
      --pill-border:  rgba(255, 255, 255, 0.1);
      --err:          #ff5555;
      --panel-bg:     rgba(40, 42, 54, 0.92);
      --panel-border: rgba(255, 255, 255, 0.1);
      --toggle-on:    #bd93f9;
    }

    [data-theme="gruvbox"] {
      --bg:           #282828;
      --fg:           #ebdbb2;
      --fg-dim:       rgba(235, 219, 178, 0.4);
      --fg-subtle:    rgba(235, 219, 178, 0.15);
      --divider:      rgba(235, 219, 178, 0.1);
      --caret-col:    #fabd2f;
      --caret-glow:   rgba(250, 189, 47, 0.5);
      --caret-err:    #fb4934;
      --caret-err-glow: rgba(251, 73, 52, 0.5);
      --pill-bg:      rgba(255, 255, 255, 0.05);
      --pill-border:  rgba(255, 255, 255, 0.1);
      --err:          #fb4934;
      --panel-bg:     rgba(40, 40, 40, 0.92);
      --panel-border: rgba(255, 255, 255, 0.1);
      --toggle-on:    #fabd2f;
    }

    [data-theme="nord"] {
      --bg:           #2e3440;
      --fg:           #eceff4;
      --fg-dim:       rgba(236, 239, 244, 0.4);
      --fg-subtle:    rgba(236, 239, 244, 0.15);
      --divider:      rgba(236, 239, 244, 0.1);
      --caret-col:    #88c0d0;
      --caret-glow:   rgba(136, 192, 208, 0.5);
      --caret-err:    #bf616a;
      --caret-err-glow: rgba(191, 97, 106, 0.5);
      --pill-bg:      rgba(255, 255, 255, 0.05);
      --pill-border:  rgba(255, 255, 255, 0.1);
      --err:          #bf616a;
      --panel-bg:     rgba(46, 52, 64, 0.92);
      --panel-border: rgba(255, 255, 255, 0.1);
      --toggle-on:    #88c0d0;
    }

    [data-theme="matrix"] {
      --bg:           #000000;
      --fg:           #00ff00;
      --fg-dim:       rgba(0, 255, 0, 0.4);
      --fg-subtle:    rgba(0, 255, 0, 0.15);
      --divider:      rgba(0, 255, 0, 0.2);
      --caret-col:    #00ff00;
      --caret-glow:   rgba(0, 255, 0, 0.6);
      --caret-err:    #ff0000;
      --caret-err-glow: rgba(255, 0, 0, 0.6);
      --pill-bg:      rgba(0, 255, 0, 0.05);
      --pill-border:  rgba(0, 255, 0, 0.2);
      --err:          #ff0000;
      --panel-bg:     rgba(0, 0, 0, 0.92);
      --panel-border: rgba(0, 255, 0, 0.2);
      --toggle-on:    #00ff00;
    }

    /* ════════════════════════════════════════════════════════════════
       RESET & BASE
    ════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
    }

    /* ════════════════════════════════════════════════════════════════
       LAYOUT — Notebook Architecture
    ════════════════════════════════════════════════════════════════ */
    #app {
      height: 100vh;
      width: 100vw;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 50vh; /* Allow scrolling past the last block */
      scroll-behavior: smooth;
    }

    #blocks-container {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .block {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
      padding: 4rem 0;
      position: relative;
      justify-content: center;
    }

    .pane {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .pane-input {
      margin-bottom: 2rem;
    }

    .pane-output {
      flex-direction: column;
      gap: 0.6rem;
      min-height: 4rem;
    }

    /* ════════════════════════════════════════════════════════════════
       SCALE WRAPPER
    ════════════════════════════════════════════════════════════════ */
    .scale-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      will-change: transform;
      transition: transform 0.13s var(--ease);
    }

    /* ════════════════════════════════════════════════════════════════
       TEXTAREA  (LaTeX input)
    ════════════════════════════════════════════════════════════════ */
    .latex-input {
      display: block;
      border: none;
      outline: none;
      background: transparent;
      color: var(--fg);
      font-family: var(--mono);
      font-size: clamp(1.05rem, 2.3vw, 1.7rem);
      font-weight: 300;
      line-height: 1.65;
      letter-spacing: 0.018em;
      resize: none;
      white-space: pre;
      word-break: keep-all;
      overflow: hidden;
      caret-color: transparent;
      padding: 0;
      min-width: 48vw;
      text-align: center;
    }

    .latex-input::placeholder {
      color: var(--fg-dim);
      font-style: italic;
    }

    /* ════════════════════════════════════════════════════════════════
       MIRROR DIV — off-screen measurement tool
    ════════════════════════════════════════════════════════════════ */
    #mirror {
      position: fixed;
      top: -9999px;
      left: -9999px;
      visibility: hidden;
      pointer-events: none;
      white-space: pre;
      word-break: keep-all;
    }

    /* ════════════════════════════════════════════════════════════════
       CUSTOM CARET
    ════════════════════════════════════════════════════════════════ */
    #custom-caret {
      position: fixed;
      z-index: 9999;
      width: 2px;
      border-radius: 2px;
      background: var(--caret-col);
      box-shadow: 0 0 8px  var(--caret-glow),
                  0 0 22px var(--caret-glow);
      pointer-events: none;
      opacity: 0;
      transition: left   0.05s var(--ease),
                  top    0.05s var(--ease),
                  opacity 0.18s ease,
                  background 0.45s ease,
                  box-shadow  0.45s ease;
      animation: caret-blink 1.05s ease-in-out infinite;
    }

    @keyframes caret-blink {
      0%, 100% { opacity: 1; }
      42%, 58%  { opacity: 0; }
    }

    /* ════════════════════════════════════════════════════════════════
       KATEX OUTPUT
    ════════════════════════════════════════════════════════════════ */
    .katex-output {
      text-align: center;
      color: var(--fg);
      font-size: clamp(1.2rem, 3vw, 2.2rem);
    }

    .katex { color: inherit !important; }
    .katex-display { margin: 0 !important; overflow: visible !important; }

    .output-hint {
      font-family: var(--mono);
      font-size: clamp(0.72rem, 1.4vw, 0.92rem);
      font-weight: 300;
      letter-spacing: 0.07em;
      color: var(--fg-dim);
    }

    /* ════════════════════════════════════════════════════════════════
       APPROX OUTPUT  — smaller, faded, below the main result
    ════════════════════════════════════════════════════════════════ */
    .approx-output {
      text-align: center;
      color: var(--fg-dim);
      font-size: clamp(0.75rem, 1.6vw, 1.1rem);
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.35s var(--ease), max-height 0.35s var(--ease);
      pointer-events: none;
    }

    .approx-output.visible {
      opacity: 1;
      max-height: 4rem;
      pointer-events: auto;
    }

    .plot-container .tick text {
      fill: var(--fg-subtle) !important;
    }
    
    /* ════════════════════════════════════════════════════════════════
       CONSTANTS PANEL
    ════════════════════════════════════════════════════════════════ */
    #constants-panel {
      position: fixed;
      top: 50%;
      left: 2rem;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      opacity: 0.15;
      transition: opacity 0.2s var(--ease);
      pointer-events: auto;
      z-index: 100;
    }
    
    #constants-panel:hover, #constants-panel:focus-within {
      opacity: 1;
    }
    
    /* Reveal hitbox so you don't have to be pixel perfect to trigger hover */
    #constants-panel::before {
      content: '';
      position: absolute;
      top: -2rem; bottom: -2rem; left: -2rem; right: -2rem;
      z-index: -1;
    }

    .constant-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .constant-row input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: var(--mono);
      font-size: 1.1rem;
      padding: 0;
      margin: 0;
    }
    
    .constant-row input.constant-key {
      width: 2rem;
      text-align: right;
    }
    
    .constant-row span {
      color: var(--fg-dim);
      font-family: var(--mono);
      font-size: 1.1rem;
    }
    
    .constant-row input.constant-val {
      width: 4rem;
    }
    
    #add-constant-btn {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 1.1rem;
      text-align: left;
      padding-left: 3rem;
    }
    
    #add-constant-btn:hover {
      color: var(--fg);
    }.approx-output .katex { color: var(--fg-dim) !important; }
    .approx-output .katex-display { margin: 0 !important; }

    /* ════════════════════════════════════════════════════════════════
       UI CHROME — theme toggle, worker badge, corner label
    ════════════════════════════════════════════════════════════════ */

    /* ── Corner label (top-left) ── */
    #corner-label {
      position: fixed;
      top: 1.15rem;
      left: 1.4rem;
      z-index: 500;
      font-family: var(--sans);
      font-size: 0.60rem;
      font-weight: 400;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--fg-dim);
      user-select: none;
      pointer-events: none;
    }

    /* ── Theme toggle (top-right) ── */
    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1.4rem;
      z-index: 500;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 100px;
      padding: 0.32rem 0.85rem;
      color: var(--fg-dim);
      font-family: var(--sans);
      font-size: 0.64rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: color 0.2s, background 0.2s, transform 0.1s;
    }
    #theme-toggle:hover  { color: var(--fg); background: var(--pill-border); }
    #theme-toggle:active { transform: scale(0.95); }

    /* ── Worker status badge (bottom-right) ── */
    #worker-badge {
      position: fixed;
      bottom: 1.1rem;
      right: 1.4rem;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--mono);
      font-size: 0.60rem;
      letter-spacing: 0.09em;
      color: var(--fg-dim);
      transition: color 0.4s;
    }

    #worker-dot {
      flex-shrink: 0;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    #worker-badge[data-state="loading"] { color: #facc15; }
    #worker-badge[data-state="loading"] #worker-dot {
      animation: dot-pulse 0.9s ease-in-out infinite;
    }
    #worker-badge[data-state="ready"] { color: #4ade80; }
    #worker-badge[data-state="ready"] #worker-dot {
      box-shadow: 0 0 7px #4ade8099;
    }
    #worker-badge[data-state="error"] { color: var(--err); }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* ════════════════════════════════════════════════════════════════
       COMMAND PALETTE
    ════════════════════════════════════════════════════════════════ */
    #cmd-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-ovl);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15vh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #cmd-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    #cmd-palette {
      width: 100%;
      max-width: 600px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      transform: translateY(-20px) scale(0.98);
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    #cmd-overlay.open #cmd-palette {
      transform: translateY(0) scale(1);
    }

    #cmd-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--divider);
      padding: 1.25rem 1.5rem;
      font-size: 1.2rem;
      color: var(--fg);
      font-family: var(--sans);
      outline: none;
    }

    #cmd-input::placeholder {
      color: var(--fg-subtle);
    }

    #cmd-results {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 400px;
      overflow-y: auto;
    }

    .cmd-item {
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--fg);
      border-left: 3px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cmd-item:hover, .cmd-item.selected {
      background: var(--pill-subtle);
      border-left-color: var(--caret-col);
    }
    
    .cmd-item-desc {
      font-family: var(--sans);
      font-size: 0.8rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<!-- ── Static chrome ──────────────────────────────────────────────────── -->
<span id="corner-label" aria-hidden="true">LaTeX Calc</span>

<div id="constants-panel">
  <!-- initial constant example -->
  <div class="constant-row">
    <input type="text" class="constant-key" value="a" placeholder="var" oninput="_triggerAllBlocks()" />
    <span>=</span>
    <input type="text" class="constant-val" value="5" placeholder="val" oninput="_triggerAllBlocks()" />
  </div>
  <button id="add-constant-btn" onclick="_addConstantRow()">+</button>
</div>

<button id="theme-toggle" aria-label="Toggle light/dark mode">Light</button>

<div id="worker-badge" data-state="loading" role="status" aria-live="polite">
  <div id="worker-dot"></div>
  <span id="worker-label">loading</span>
</div>

<!-- ── Custom caret (JS-positioned) ─────────────────────────────────── -->
<div id="custom-caret" aria-hidden="true"></div>

<!-- ── Mirror div (off-screen measurement tool) ─────────────────────── -->
<div id="mirror" aria-hidden="true"></div>

<!-- ── Command Palette ─────────────────────────────────────────────────── -->
<div id="cmd-overlay" aria-hidden="true">
  <div id="cmd-palette" role="dialog" aria-modal="true" aria-label="Command Palette">
    <input type="text" id="cmd-input" placeholder="Search equations or commands (e.g. Theme, Approx)..." autocomplete="off" spellcheck="false" />
    <ul id="cmd-results" role="listbox"></ul>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════════════
     NOTEBOOK LAYOUT
════════════════════════════════════════════════════════════════════ -->
<div id="app">
  <div id="blocks-container" role="main" aria-label="Notebook blocks">
    <!-- Blocks will be injected here by JS -->
  </div>
</div><!-- /#app -->


<script>
/* ════════════════════════════════════════════════════════════════════════
   LIVE LATEX CALCULATOR — Frontend Shell
   ════════════════════════════════════════════════════════════════════════

   ┌─────────────────────────────────────────────────────────────────────┐
   │  PUBLIC INTERFACE — wire your Pyodide worker bridge here            │
   │                                                                     │
   │  sendToWorker(latexString)                                          │
   │    Called on every debounced keystroke with the raw LaTeX string.   │
   │    Replace the stub body with:                                      │
   │      worker.postMessage({ id: ++latestId, latexInput: latex })      │
   │                                                                     │
   │  receiveFromWorker(payload)                                         │
   │    Call this from your worker's onmessage handler:                  │
   │      worker.onmessage = ({ data }) => window.receiveFromWorker(data)│
   │    payload shape: { id, status, result?, approx?, error? }          │
   │                                                                     │
   │  setWorkerStatus(state)                                             │
   │    Updates the status badge. states: 'loading' | 'ready' | 'error' │
   │    Call after Pyodide loads or fails.                               │
   └─────────────────────────────────────────────────────────────────────┘
════════════════════════════════════════════════════════════════════════ */

'use strict';

/* ── DOM references ─────────────────────────────────────────────────── */
const caret         = document.getElementById('custom-caret');
const mirror        = document.getElementById('mirror');
const themeBtn      = document.getElementById('theme-toggle');
const workerBadge   = document.getElementById('worker-badge');
const workerLabel   = document.getElementById('worker-label');


/* ── Tuning constants ───────────────────────────────────────────────── */
const SAFE_MARGIN  = 0.88;
const MIN_W_VW     = 0.50;
const DEBOUNCE_MS  = 130;
const ERR_GLOW_MS  = 1500;   // ms of incomplete status before caret turns red

/* ── Font properties to sync from textarea → mirror ────────────────── */
const MIRROR_PROPS = [
  'fontFamily','fontSize','fontWeight','fontStyle','fontVariant',
  'letterSpacing','lineHeight','textAlign',
  'paddingTop','paddingBottom','paddingLeft','paddingRight',
  'borderTopWidth','borderBottomWidth','borderLeftWidth','borderRightWidth',
  'boxSizing','whiteSpace','wordBreak',
];

/* ── LocalStorage keys ──────────────────────────────────────────────── */
const LS = {
  INPUT:       'latexcalc_input',
  THEME:       'latexcalc_theme',
  SHOW_APPROX: 'latexcalc_showApprox',
  ASSUME_REAL: 'latexcalc_assumeReal',
};


/* ════════════════════════════════════════════════════════════════════════
   SECTION 1 — SETTINGS STATE  (settings + localStorage hydration)
════════════════════════════════════════════════════════════════════════ */

const settings = {
  showApprox:  false,
  assumeReal:  false,
  useDegrees:  false,
  precision:   10,
  stepsMode:   'off'
};

/**
 * Persist a key to localStorage safely.
 */
function _lsSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(_) {}
}

/**
 * Load a key from localStorage safely. Returns `fallback` on miss/error.
 */
function _lsLoad(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch(_) { return fallback; }
}

/* ════════════════════════════════════════════════════════════════════════
   SECTION 2 — THEME
════════════════════════════════════════════════════════════════════════ */
let currentTheme = 'dark';

function _applyTheme(theme) {
  if (theme === true) theme = 'dark'; // migration
  if (theme === false) theme = 'light';
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  if (themeBtn) {
    themeBtn.textContent = theme.charAt(0).toUpperCase() + theme.slice(1);
  }
  _lsSave(LS.THEME, theme);
}

if (themeBtn) {
  themeBtn.addEventListener('click', () => {
    _applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  });
}


/* ════════════════════════════════════════════════════════════════════════
   SECTION 3 — COMMAND PALETTE
════════════════════════════════════════════════════════════════════════ */

const cmdOverlay = document.getElementById('cmd-overlay');
const cmdInput   = document.getElementById('cmd-input');
const cmdResults = document.getElementById('cmd-results');
let _cmdOpen = false;
let _cmdSelectedIndex = -1;
let _cmdItems = [];
let _cmdSavedFocus = null;
let _cmdCurrentMenu = 'root';

function _openPalette() {
  _cmdSavedFocus = document.activeElement;
  _cmdOpen = true;
  _cmdCurrentMenu = 'root';
  cmdOverlay.classList.add('open');
  cmdOverlay.setAttribute('aria-hidden', 'false');
  cmdInput.value = '';
  _renderCmdResults();
  setTimeout(() => cmdInput.focus(), 50); // wait for transition
}

function _closePalette() {
  _cmdOpen = false;
  cmdOverlay.classList.remove('open');
  cmdOverlay.setAttribute('aria-hidden', 'true');
  cmdInput.blur();
  if (_cmdSavedFocus) {
    _cmdSavedFocus.focus();
    _cmdSavedFocus = null;
  }
}

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    _cmdOpen ? _closePalette() : _openPalette();
  }
  if (e.key === 'Escape' && _cmdOpen) {
    e.preventDefault();
    _closePalette();
  }
});

cmdOverlay.addEventListener('mousedown', (e) => {
  if (e.target === cmdOverlay) _closePalette();
});

cmdInput.addEventListener('input', _renderCmdResults);
cmdInput.addEventListener('keydown', (e) => {
  if (!_cmdOpen) return;
  if (e.key === 'Backspace' && cmdInput.value === '' && _cmdCurrentMenu !== 'root') {
    e.preventDefault();
    _cmdCurrentMenu = 'root';
    _renderCmdResults();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _cmdSelectedIndex = Math.min(_cmdSelectedIndex + 1, _cmdItems.length - 1);
    _drawCmdSelection();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _cmdSelectedIndex = Math.max(_cmdSelectedIndex - 1, 0);
    _drawCmdSelection();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (_cmdSelectedIndex >= 0 && _cmdSelectedIndex < _cmdItems.length) {
      _executeCmd(_cmdItems[_cmdSelectedIndex]);
    }
  }
});

function _renderCmdResults() {
  const query = cmdInput.value.toLowerCase().trim();
  _cmdItems = [];

  if (_cmdCurrentMenu === 'root') {
    cmdInput.placeholder = "Search commands or equations...";
    const rootCmds = [
      { type: 'menu', id: 'themes', label: 'Themes...', keywords: 'theme color dark light' },
      { type: 'menu', id: 'settings', label: 'Settings...', keywords: 'settings approx assume angle precision' },
      { type: 'menu', id: 'steps_mode', label: 'Steps Mode...', keywords: 'steps mode friendly raw off' },
      { type: 'cmd', label: `Clear Notebook`, keywords: 'clear notebook empty delete' }
    ];
    rootCmds.forEach(cmd => {
      if (!query || cmd.label.toLowerCase().includes(query) || cmd.keywords.includes(query)) _cmdItems.push(cmd);
    });
    blocks.forEach(b => {
      if (b.latex && b.latex.trim().length > 0) {
        if (!query || b.latex.toLowerCase().includes(query)) {
          _cmdItems.push({ type: 'block', id: b.id, label: b.latex });
        }
      }
    });
  } else if (_cmdCurrentMenu === 'themes') {
    cmdInput.placeholder = "Search themes...";
    _cmdItems.push({ type: 'back', label: '< Back to Main Menu', keywords: '' });
    const themes = [
      { type: 'cmd', label: 'Theme: Dark', keywords: 'dark' },
      { type: 'cmd', label: 'Theme: Light', keywords: 'light' },
      { type: 'cmd', label: 'Theme: Dracula', keywords: 'dracula' },
      { type: 'cmd', label: 'Theme: Gruvbox', keywords: 'gruvbox' },
      { type: 'cmd', label: 'Theme: Nord', keywords: 'nord' },
      { type: 'cmd', label: 'Theme: Matrix', keywords: 'matrix hacker' }
    ];
    themes.forEach(cmd => {
      if (!query || cmd.label.toLowerCase().includes(query) || cmd.keywords.includes(query)) _cmdItems.push(cmd);
    });
  } else if (_cmdCurrentMenu === 'settings') {
    cmdInput.placeholder = "Search settings...";
    _cmdItems.push({ type: 'back', label: '< Back to Main Menu', keywords: '' });
    const settingsCmds = [
      { type: 'cmd', label: `Settings: Show Approximations (${settings.showApprox ? 'ON' : 'OFF'})`, keywords: 'approx decimal setting' },
      { type: 'cmd', label: `Settings: Assume Real Variables (${settings.assumeReal ? 'ON' : 'OFF'})`, keywords: 'assume real variables setting' },
      { type: 'cmd', label: `Settings: Toggle Angles (${settings.useDegrees ? 'Degrees' : 'Radians'})`, keywords: 'angle degree radian setting' },
      { type: 'cmd', label: `Settings: Set Precision: 10`, keywords: 'precision decimals' }
    ];
    settingsCmds.forEach(cmd => {
      if (!query || cmd.label.toLowerCase().includes(query) || cmd.keywords.includes(query)) _cmdItems.push(cmd);
    });
  } else if (_cmdCurrentMenu === 'steps_mode') {
    cmdInput.placeholder = "Search steps mode...";
    _cmdItems.push({ type: 'back', label: '< Back to Main Menu', keywords: '' });
    const stepsCmds = [
      { type: 'cmd', label: `Steps Mode: Off${settings.stepsMode === 'off' ? ' (Active)' : ''}`, keywords: 'off disabled' },
      { type: 'cmd', label: `Steps Mode: Raw${settings.stepsMode === 'raw' ? ' (Active)' : ''}`, keywords: 'raw internal ast' },
      { type: 'cmd', label: `Steps Mode: Friendly${settings.stepsMode === 'friendly' ? ' (Active)' : ''}`, keywords: 'friendly tutor manual' }
    ];
    stepsCmds.forEach(cmd => {
      if (!query || cmd.label.toLowerCase().includes(query) || cmd.keywords.includes(query)) _cmdItems.push(cmd);
    });
  }

  _cmdSelectedIndex = _cmdItems.length > 0 ? 0 : -1;
  
  cmdResults.innerHTML = '';
  _cmdItems.forEach((item, index) => {
    const li = document.createElement('li');
    li.className = 'cmd-item';
    
    const textSpan = document.createElement('span');
    // truncate overly long latex
    let disp = item.label;
    if (disp.length > 60) disp = disp.substring(0, 58) + '...';
    textSpan.textContent = disp;
    li.appendChild(textSpan);

    const descSpan = document.createElement('span');
    descSpan.className = 'cmd-item-desc';
    descSpan.textContent = item.type === 'menu' ? 'Menu' : item.type === 'back' ? 'Back' : item.type === 'cmd' ? 'Command' : 'Equation';
    li.appendChild(descSpan);

    li.addEventListener('mousedown', (e) => {
      e.preventDefault(); // keep focus on input
      _executeCmd(item);
    });
    
    li.addEventListener('mouseenter', () => {
      _cmdSelectedIndex = index;
      _drawCmdSelection();
    });

    cmdResults.appendChild(li);
  });
  
  _drawCmdSelection();
}

function _drawCmdSelection() {
  const items = cmdResults.querySelectorAll('.cmd-item');
  items.forEach((el, idx) => {
    if (idx === _cmdSelectedIndex) {
      el.classList.add('selected');
      el.scrollIntoView({ block: 'nearest' });
    } else {
      el.classList.remove('selected');
    }
  });
}

function _executeCmd(item) {
  if (item.type === 'menu') {
    _cmdCurrentMenu = item.id;
    cmdInput.value = '';
    _renderCmdResults();
    return;
  } else if (item.type === 'back') {
    _cmdCurrentMenu = 'root';
    cmdInput.value = '';
    _renderCmdResults();
    return;
  }
  
  _closePalette();
  if (item.type === 'cmd') {
    if (item.label.includes('Theme:')) {
      const theme = item.label.split('Theme: ')[1].toLowerCase();
      _applyTheme(theme);
    } else if (item.label.includes('Approx')) {
      settings.showApprox = !settings.showApprox;
      _lsSave(LS.SHOW_APPROX, settings.showApprox);
      if (!settings.showApprox) {
        blocks.forEach(b => _hideApprox(b.id));
      } else {
        blocks.forEach(b => { if (b.approx) _renderApprox(b.id, b.approx); });
      }
    } else if (item.label.includes('Assume')) {
      settings.assumeReal = !settings.assumeReal;
      _lsSave(LS.ASSUME_REAL, settings.assumeReal);
      if (readyCount === WORKER_COUNT) {
        blocks.forEach(b => { if (b.latex.trim()) sendToWorker(b.id, b.latex); });
      }
    } else if (item.label.includes('Toggle Angles')) {
      settings.useDegrees = !settings.useDegrees;
      _lsSave(LS.USE_DEGREES, settings.useDegrees);
      if (readyCount === WORKER_COUNT) {
        blocks.forEach(b => { if (b.latex.trim()) sendToWorker(b.id, b.latex); });
      }
    } else if (item.label.includes('Set Precision: 10')) {
      settings.precision = 10;
      _lsSave(LS.PRECISION, settings.precision);
      if (readyCount === WORKER_COUNT) {
        blocks.forEach(b => { if (b.latex.trim()) sendToWorker(b.id, b.latex); });
      }
    } else if (item.label.includes('Steps Mode:')) {
      if (item.label.includes('Off')) {
        settings.stepsMode = 'off';
      } else if (item.label.includes('Raw')) {
        settings.stepsMode = 'raw';
      } else if (item.label.includes('Friendly')) {
        settings.stepsMode = 'friendly';
      }
      _lsSave(LS.STEPS_MODE, settings.stepsMode);
      if (readyCount === WORKER_COUNT) {
        blocks.forEach(b => { if (b.latex.trim()) sendToWorker(b.id, b.latex); });
      }
    } else if (item.label.includes('Clear Notebook')) {
      blocks.slice().forEach(b => {
        const el = document.getElementById(`block-${b.id}`);
        if (el) el.remove();
      });
      blocks = [];
      _saveNotebook();
      _createBlock('', null, true);
    }
  } else if (item.type === 'block') {
    const ta = document.getElementById(`in-${item.id}`);
    if (ta) {
      ta.focus();
      const el = document.getElementById(`block-${item.id}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

/* ════════════════════════════════════════════════════════════════════════
   SECTION 4 — NOTEBOOK STATE
════════════════════════════════════════════════════════════════════════ */

// Array of blocks: { id, latex, approx }
let blocks = [];
let activeBlockId = null;

function _saveNotebook() {
  // Save only ID, latex, and approx (if any) to avoid saving large DOM/status states
  const data = blocks.map(b => ({
    id: b.id,
    latex: b.latex,
    approx: b.approx || null
  }));
  _lsSave(LS.INPUT, data);
}

/* ════════════════════════════════════════════════════════════════════════
   SECTION 5 — WORKER THREAD POOL & ROUTING
════════════════════════════════════════════════════════════════════════ */

const WORKER_COUNT = 2;
const workers = [];
let readyCount = 0;
let requestSequence = 0;

// Queue for pending requests when all workers are busy
// Maps blockId -> { latex, sequenceId }
const pendingQueue = new Map();

function _createWorker(i) {
  const w = new Worker('worker.js?v=4');
  if (!workers[i]) workers[i] = { worker: null, idle: true };
  workers[i].worker = w;
  workers[i].idle = true;

  w.onmessage = ({ data }) => {
    if (data.status === 'progress') {
      if (i === 0) { // Only show progress for the first worker
        setWorkerStatus('loading');
        workerLabel.textContent = data.step;
      }
      return;
    }

    if (data.status === 'ready') {
      readyCount++;
      if (readyCount === WORKER_COUNT) {
        setWorkerStatus('ready');
        // Initial boot eval:
        blocks.forEach(b => { if (b.latex.trim()) sendToWorker(b.id, b.latex); });
      }
      return;
    }

    if (data.status === 'init_error') {
      setWorkerStatus('error');
      return;
    }

    workers[i].idle = true;

    const block = blocks.find(b => b.id === data.blockId);
    if (block) {
      if (block.watchdogTimer) {
        clearTimeout(block.watchdogTimer);
        block.watchdogTimer = null;
      }
      _clearThinkingState(block.id);
      
      // Discard stale responses
      if (data.id === block.latestSeq) {
        _handleWorkerResponse(block, data);
      }
    }

    _processQueue();
  };

  w.onerror = (e) => {
    console.error(`[worker ${i}] Uncaught error:`, e);
    workers[i].idle = true;
    setWorkerStatus('error');
    
    // Clear any block associated with this worker
    blocks.forEach(block => {
      if (block.activeWorkerIndex === i) {
        if (block.watchdogTimer) {
          clearTimeout(block.watchdogTimer);
          block.watchdogTimer = null;
        }
        _clearThinkingState(block.id);
      }
    });
    
    _processQueue();
  };
}

for (let i = 0; i < WORKER_COUNT; i++) {
  _createWorker(i);
}

function _setThinkingState(blockId) {
  const el = document.getElementById(`block-${blockId}`);
  if (el) {
    const out = el.querySelector('.pane-output');
    if (out) out.classList.add('thinking');
  }
}

function _clearThinkingState(blockId) {
  const el = document.getElementById(`block-${blockId}`);
  if (el) {
    const out = el.querySelector('.pane-output');
    if (out) out.classList.remove('thinking');
  }
}

function _processQueue() {
  const idleWorkerIndex = workers.findIndex(w => w.idle);
  if (idleWorkerIndex === -1) return;
  if (pendingQueue.size === 0) return;

  const [blockId, req] = pendingQueue.entries().next().value;
  pendingQueue.delete(blockId);

  _dispatchToWorker(idleWorkerIndex, blockId, req.latex, req.sequenceId);
}

function _dispatchToWorker(workerIndex, blockId, latex, seqId) {
  const workerObj = workers[workerIndex];
  workerObj.idle = false;
  
  const block = blocks.find(b => b.id === blockId);
  if (block) {
    block.activeWorkerIndex = workerIndex;
    _setThinkingState(blockId);
    
    if (block.watchdogTimer) clearTimeout(block.watchdogTimer);
    block.watchdogTimer = setTimeout(() => {
      // The Executioner
      console.warn(`Worker ${workerIndex} hung! Terminating and replacing...`);
      workerObj.worker.terminate();
      
      readyCount = Math.max(0, readyCount - 1);
      _createWorker(workerIndex);
      
      _clearThinkingState(blockId);
      block.watchdogTimer = null;
      _showError(blockId, "Computation Timeout: Expression intractable.");
      
    }, 5000);
  }
  
  const constants = getGlobalConstants();
  console.log("Payload Constants:", constants);

  workerObj.worker.postMessage({
    id: seqId,
    blockId: blockId,
    latexInput: latex,
    settings: { 
      assumeReal: settings.assumeReal, 
      useDegrees: settings.useDegrees, 
      precision: settings.precision, 
      stepsMode: settings.stepsMode,
      context: constants
    }
  });
}

function getGlobalConstants() {
  const constants = {};
  document.querySelectorAll('#constants-panel .constant-row').forEach(row => {
    const key = row.querySelector('.constant-key').value.trim();
    const val = row.querySelector('.constant-val').value.trim();
    if (key && val) {
      constants[key] = val;
    }
  });
  return constants;
}

function _addConstantRow() {
  const panel = document.getElementById('constants-panel');
  const btn = document.getElementById('add-constant-btn');
  const row = document.createElement('div');
  row.className = 'constant-row';
  row.innerHTML = `
    <input type="text" class="constant-key" placeholder="var" oninput="_triggerAllBlocks()" />
    <span>=</span>
    <input type="text" class="constant-val" placeholder="val" oninput="_triggerAllBlocks()" />
  `;
  panel.insertBefore(row, btn);
}

function _triggerAllBlocks() {
  blocks.forEach(b => {
    sendToWorker(b.id, b.latex);
  });
}

function sendToWorker(blockId, latex) {
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;

  requestSequence++;
  block.latestSeq = requestSequence;

  if (readyCount < WORKER_COUNT) {
    pendingQueue.set(blockId, { latex, sequenceId: requestSequence });
    return;
  }

  const idleWorkerIndex = workers.findIndex(w => w.idle);
  if (idleWorkerIndex !== -1) {
    _dispatchToWorker(idleWorkerIndex, blockId, latex, requestSequence);
  } else {
    pendingQueue.set(blockId, { latex, sequenceId: requestSequence });
  }
}

function setWorkerStatus(state) {
  workerBadge.setAttribute('data-state', state);
  workerLabel.textContent = state;
}

function _handleWorkerResponse(block, data) {
  if (data.status === 'success') {
    _clearErrorGlow();
    
    // ── KaTeX ────────────────────────────────────────────────────────────────
    _renderKatex(block.id, data.result);
    if (data.approx) {
      block.approx = data.approx;
      if (settings.showApprox) _renderApprox(block.id, data.approx);
    } else {
      block.approx = null;
      _hideApprox(block.id);
    }
    
    // ── Steps ────────────────────────────────────────────────────────────────
    const stepsToggle = document.getElementById(`steps-toggle-${block.id}`);
    const stepsContainer = document.getElementById(`steps-container-${block.id}`);
    if (data.steps && data.steps.length > 0 && stepsToggle && stepsContainer) {
      stepsToggle.style.display = 'block';
      stepsToggle.textContent = `[+] Show Steps (${data.steps.length})`;
      stepsContainer.innerHTML = '';
      data.steps.forEach(stepLatex => {
        const stepEl = document.createElement('div');
        stepEl.className = 'step-item';
        katex.render(stepLatex, stepEl, { displayMode: true, throwOnError: false });
        stepsContainer.appendChild(stepEl);
      });
    } else if (stepsToggle && stepsContainer) {
      stepsToggle.style.display = 'none';
      stepsContainer.innerHTML = '';
      stepsContainer.classList.remove('open');
    }
    

    // ── Graphing Engine ──────────────────────────────────────────────────────
    const plotContainer = document.getElementById(`plot-container-${block.id}`);
    if (data.plot && plotContainer) {
      plotContainer.style.display = 'flex';
      plotContainer.innerHTML = '';
      
      const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--caret-col').trim() || '#8b78ff';
      let xDomain = [-10, 10];
      if (data.plot.bounds) {
        const span = Math.abs(data.plot.bounds[1] - data.plot.bounds[0]);
        const pad = Math.max(span * 0.2, 1);
        xDomain = [data.plot.bounds[0] - pad, data.plot.bounds[1] + pad];
      }
      
      try {
        if (plotContainer.__observer) {
          plotContainer.__observer.disconnect();
        }

        functionPlot({
          target: `#plot-container-${block.id}`,
          width: 500,
          height: 250,
          grid: false,
          xAxis: { domain: xDomain },
          data: [{
            fn: data.plot.fn,
            color: accentColor,
            range: data.plot.bounds || undefined,
            closed: data.plot.bounds ? true : false
          }]
        });

        // Move axes to cross at the origin and keep them there during zoom
        const svg = plotContainer.querySelector('svg');
        if (svg) {
          const updateAxes = () => {
            const originLines = svg.querySelectorAll('.origin line');
            let xZero = null, yZero = null;
            originLines.forEach(l => {
              if (l.getAttribute('x1') === l.getAttribute('x2')) xZero = l.getAttribute('x1');
              if (l.getAttribute('y1') === l.getAttribute('y2')) yZero = l.getAttribute('y1');
            });
            if (xZero) {
              const yAxis = svg.querySelector('.y.axis');
              if (yAxis) yAxis.setAttribute('transform', `translate(${xZero}, 0)`);
            }
            if (yZero) {
              const xAxis = svg.querySelector('.x.axis');
              if (xAxis) xAxis.setAttribute('transform', `translate(0, ${yZero})`);
            }
          };
          updateAxes();
          
          const observer = new MutationObserver(updateAxes);
          observer.observe(svg, { childList: true, subtree: true, attributes: true, attributeFilter: ['transform', 'd', 'x1', 'y1'] });
          plotContainer.__observer = observer;
        }
      } catch (err) {
        console.error("Plot error", err);
      }
    } else if (plotContainer) {
      plotContainer.style.display = 'none';
      plotContainer.innerHTML = '';
    }

  } else if (data.status === 'incomplete') {
    _scheduleErrorGlow();
    _hideApprox(block.id);
  } else if (data.status === 'error') {
    _clearErrorGlow();
    _showError(block.id, data.error ?? 'Evaluation error');
    _hideApprox(block.id);
  }
}


/* ════════════════════════════════════════════════════════════════════════
   SECTION 6 — SYNTAX ERROR GLOW
════════════════════════════════════════════════════════════════════════ */

let _errGlowTimer = null;
let _errGlowing   = false;

function _scheduleErrorGlow() {
  if (_errGlowing) return;
  clearTimeout(_errGlowTimer);
  _errGlowTimer = setTimeout(_applyErrorGlow, ERR_GLOW_MS);
}

function _applyErrorGlow() {
  _errGlowing = true;
  caret.style.background  = 'var(--caret-err)';
  caret.style.boxShadow   = '0 0 8px var(--caret-err-glow), 0 0 22px var(--caret-err-glow)';
}

function _clearErrorGlow() {
  clearTimeout(_errGlowTimer);
  _errGlowing = false;
  caret.style.background  = '';
  caret.style.boxShadow   = '';
}


/* ════════════════════════════════════════════════════════════════════════
   SECTION 7 — RENDERING
════════════════════════════════════════════════════════════════════════ */

function _renderKatex(blockId, latex) {
  const katexOut = document.getElementById(`out-${blockId}`);
  if (!katexOut) return;
  katex.render(latex, katexOut, {
    displayMode:  true,
    throwOnError: false,
    output:       'html',
    trust:        false,
  });
  _fitOutput(blockId);
}

function _renderApprox(blockId, approxLatex) {
  const approxOut = document.getElementById(`approx-${blockId}`);
  if (!approxOut) return;
  try {
    katex.render('\\approx ' + approxLatex, approxOut, {
      displayMode:  false,
      throwOnError: false,
      output:       'html',
      trust:        false,
    });
    approxOut.classList.add('visible');
  } catch(_) {
    approxOut.classList.remove('visible');
  }
}

function _hideApprox(blockId) {
  const approxOut = document.getElementById(`approx-${blockId}`);
  if (approxOut) approxOut.classList.remove('visible');
}

function _showHint(blockId) {
  const katexOut = document.getElementById(`out-${blockId}`);
  const outputScale = document.getElementById(`scale-out-${blockId}`);
  if (!katexOut || !outputScale) return;
  katexOut.innerHTML = '<span class="output-hint">result appears here</span>';
  outputScale.style.transform = '';
  _hideApprox(blockId);
}

function _showError(blockId, msg) {
  const katexOut = document.getElementById(`out-${blockId}`);
  const outputScale = document.getElementById(`scale-out-${blockId}`);
  if (!katexOut || !outputScale) return;
  katexOut.innerHTML = `<span style="font-family:var(--mono);font-size:0.82em;color:var(--err);">${_esc(msg)}</span>`;
  outputScale.style.transform = '';
}


function _toggleSteps(blockId) {
  const container = document.getElementById(`steps-container-${blockId}`);
  const toggle = document.getElementById(`steps-toggle-${blockId}`);
  if (!container || !toggle) return;
  const isOpen = container.classList.contains('open');
  if (isOpen) {
    container.classList.remove('open');
    toggle.textContent = toggle.textContent.replace('[-]', '[+]').replace('Hide', 'Show');
  } else {
    container.classList.add('open');
    toggle.textContent = toggle.textContent.replace('[+]', '[-]').replace('Show', 'Hide');
  }
}

function _esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


/* ════════════════════════════════════════════════════════════════════════
   SECTION 8 — BLOCK MANAGEMENT (NOTEBOOK DOM)
════════════════════════════════════════════════════════════════════════ */

function _generateId() {
  return Math.random().toString(36).substring(2, 9);
}

function _createBlock(initialLatex = '', approx = null, focusAfter = false) {
  const blockId = _generateId();
  const block = { id: blockId, latex: initialLatex, approx: approx, latestSeq: 0 };
  blocks.push(block);

  const container = document.getElementById('blocks-container');
  const el = document.createElement('div');
  el.className = 'block';
  el.id = `block-${blockId}`;
  
  el.innerHTML = `
    <section class="pane pane-input" aria-label="LaTeX input">
      <div class="scale-wrapper" id="scale-in-${blockId}">
        <textarea
          id="in-${blockId}"
          class="latex-input"
          rows="1"
          wrap="off"
          spellcheck="false"
          autocorrect="off"
          autocomplete="off"
          autocapitalize="off"
          aria-label="Type a LaTeX expression"
          placeholder="\\int_{0}^{1} x^2 \\, dx"
        ></textarea>
      </div>
    </section>
    <section class="pane pane-output" aria-label="Rendered result">
      <div class="scale-wrapper" id="scale-out-${blockId}">
        <div id="out-${blockId}" class="katex-output" role="math" aria-live="polite">
          <span class="output-hint">result appears here</span>
        </div>
      </div>
      <div id="approx-${blockId}" class="approx-output" aria-live="polite"></div>
      <div id="steps-toggle-${blockId}" class="steps-toggle" style="display:none;" onclick="_toggleSteps('${blockId}')"></div>
      <div id="steps-container-${blockId}" class="steps-container"></div>
      <div class="plot-container" id="plot-container-${blockId}"></div>
    </section>
  `;
  container.appendChild(el);

  const ta = document.getElementById(`in-${blockId}`);
  ta.value = initialLatex;

  _bindBlockEvents(blockId, ta);
  
  // Observe for resizing
  _ro.observe(el.querySelector('.pane-input'));
  _ro.observe(el.querySelector('.pane-output'));

  _resizeHeight(ta);
  _fitInput(blockId);
  
  if (focusAfter) {
    ta.focus();
    // Scroll smoothly to the new block
    ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  return blockId;
}

function _deleteBlock(blockId) {
  const index = blocks.findIndex(b => b.id === blockId);
  if (index === -1) return;

  // If it's the only block, just clear its value instead of deleting
  if (blocks.length === 1) {
    const ta = document.getElementById(`in-${blockId}`);
    if (ta) {
      ta.value = '';
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }
    return;
  }

  // Remove from DOM
  const el = document.getElementById(`block-${blockId}`);
  if (el) el.remove();

  // Remove from state
  blocks.splice(index, 1);
  _saveNotebook();
  
  // Clean up debounce map
  clearTimeout(_debounceMap.get(blockId));
  _debounceMap.delete(blockId);

  // Shift focus to the previous block (or next if it was the first)
  const newFocusIndex = index > 0 ? index - 1 : 0;
  const newFocusId = blocks[newFocusIndex].id;
  const newTa = document.getElementById(`in-${newFocusId}`);
  if (newTa) {
    newTa.focus();
    newTa.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    activeBlockId = null;
    caret.style.opacity = '0';
  }
}

let _debounceMap = new Map();

function _bindBlockEvents(blockId, ta) {
  ta.addEventListener('input', () => {
    _clearErrorGlow();
    _resizeHeight(ta);
    _fitInput(blockId);
    _updateCaret();

    const block = blocks.find(b => b.id === blockId);
    if (block) block.latex = ta.value;
    _saveNotebook();

    if (!ta.value.trim()) {
      _showHint(blockId);
      clearTimeout(_debounceMap.get(blockId));
      return;
    }

    clearTimeout(_debounceMap.get(blockId));
    _debounceMap.set(blockId, setTimeout(() => sendToWorker(blockId, ta.value), DEBOUNCE_MS));
  });

  ['keyup', 'keydown', 'click', 'select'].forEach(evt =>
    ta.addEventListener(evt, (e) => {
      // Shift+Enter mechanic
      if (evt === 'keydown' && e.key === 'Enter' && e.shiftKey) {
        e.preventDefault();
        ta.blur();
        _createBlock('', null, true);
        return;
      }
      
      // Shift+Backspace mechanic
      if (evt === 'keydown' && (e.key === 'Backspace' || e.key === 'Delete') && e.shiftKey) {
        e.preventDefault();
        ta.blur();
        _deleteBlock(blockId);
        return;
      }

      _updateCaret();
    })
  );

  ta.addEventListener('focus', () => {
    activeBlockId = blockId;
    caret.style.opacity = '1';
    _updateCaret();
  });

  ta.addEventListener('blur', () => {
    if (activeBlockId === blockId) {
      activeBlockId = null;
      caret.style.opacity = '0';
    }
  });
}

function _resizeHeight(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}


/* ════════════════════════════════════════════════════════════════════════
   SECTION 9 — SHRINK-TO-FIT
════════════════════════════════════════════════════════════════════════ */

function _fitInput(blockId) {
  const ta = document.getElementById(`in-${blockId}`);
  const scaleWrapper = document.getElementById(`scale-in-${blockId}`);
  const pane = scaleWrapper?.parentElement;
  if (!ta || !scaleWrapper || !pane) return;

  _syncMirror(ta);
  mirror.style.width = 'auto';
  mirror.innerHTML   = _mirrorEsc(ta.value) || '\u00a0';

  const minW     = window.innerWidth * MIN_W_VW;
  const contentW = Math.max(minW, mirror.scrollWidth);

  ta.style.width = contentW + 'px';

  const available = pane.clientWidth * SAFE_MARGIN;
  const scale     = contentW > available ? available / contentW : 1;
  scaleWrapper.style.transform = scale < 1 ? `scale(${scale.toFixed(5)})` : '';
}

function _fitOutput(blockId) {
  const katexOut = document.getElementById(`out-${blockId}`);
  const scaleWrapper = document.getElementById(`scale-out-${blockId}`);
  const pane = scaleWrapper?.parentElement;
  if (!katexOut || !scaleWrapper || !pane) return;

  const contentW  = katexOut.scrollWidth;
  const available = pane.clientWidth * SAFE_MARGIN;
  const scale     = contentW > available ? available / contentW : 1;
  scaleWrapper.style.transform = scale < 1 ? `scale(${scale.toFixed(5)})` : '';
}

const _ro = new ResizeObserver((entries) => {
  // To avoid recalculating EVERYTHING, we could check the entries, 
  // but let's just refit the blocks that were resized.
  entries.forEach(entry => {
    const pane = entry.target;
    const isInput = pane.classList.contains('pane-input');
    const blockEl = pane.closest('.block');
    if (!blockEl) return;
    const blockId = blockEl.id.replace('block-', '');
    if (isInput) _fitInput(blockId);
    else _fitOutput(blockId);
  });
});


/* ════════════════════════════════════════════════════════════════════════
   SECTION 10 — MIRROR SYNC & CUSTOM CARET
════════════════════════════════════════════════════════════════════════ */

function _syncMirror(ta) {
  const cs = getComputedStyle(ta);
  MIRROR_PROPS.forEach(p => { mirror.style[p] = cs[p]; });
}

function _mirrorEsc(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/ /g, '&nbsp;').replace(/\n/g, '<br>');
}

function _updateCaret() {
  if (!activeBlockId) {
    caret.style.opacity = '0';
    return;
  }
  
  const ta = document.getElementById(`in-${activeBlockId}`);
  const scaleWrapper = document.getElementById(`scale-in-${activeBlockId}`);
  if (!ta || document.activeElement !== ta) {
    caret.style.opacity = '0';
    return;
  }

  _syncMirror(ta);

  const sel   = ta.selectionStart ?? 0;
  const pre   = _mirrorEsc(ta.value.slice(0, sel));
  const post  = _mirrorEsc(ta.value.slice(sel));

  mirror.style.width = ta.offsetWidth + 'px';
  mirror.innerHTML   = pre + '<span id="csent">\u200b</span>' + post;

  const sentinel = document.getElementById('csent');
  if (!sentinel) { caret.style.opacity = '0'; return; }

  const sRect = sentinel.getBoundingClientRect();
  const mRect = mirror.getBoundingClientRect();
  const tRect = ta.getBoundingClientRect();

  const natX = sRect.left - mRect.left;
  const natY = sRect.top  - mRect.top;

  const matrix = new DOMMatrix(getComputedStyle(scaleWrapper).transform);
  const scale  = matrix.a || 1;

  const fs     = parseFloat(getComputedStyle(ta).fontSize) * scale;
  const lineH  = sRect.height * scale;
  const caretH = fs * 1.20;

  const cx = tRect.left + natX * scale;
  const cy = tRect.top  + natY * scale + (lineH - caretH) / 2;

  caret.style.left    = cx + 'px';
  caret.style.top     = cy + 'px';
  caret.style.height  = caretH + 'px';
  caret.style.opacity = '1';
}

document.addEventListener('selectionchange', _updateCaret);
window.addEventListener('scroll', _updateCaret, { passive: true });
document.getElementById('app').addEventListener('scroll', _updateCaret, { passive: true });


/* ════════════════════════════════════════════════════════════════════════
   SECTION 11 — INIT (LOCALSTORAGE HYDRATION)
════════════════════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════════════════
   SECTION 9 — SCROLL SNAPPING
════════════════════════════════════════════════════════════════════════ */
let _scrollTimeout;
let _isSnapping = false;

document.getElementById('app').addEventListener('scroll', () => {
  if (_isSnapping) {
    clearTimeout(_scrollTimeout);
    _scrollTimeout = setTimeout(() => { _isSnapping = false; }, 100);
    return;
  }

  clearTimeout(_scrollTimeout);
  _scrollTimeout = setTimeout(() => {
    let nearestBlock = null;
    let minDistance = Infinity;
    const windowCenter = window.innerHeight / 2;

    document.querySelectorAll('.block').forEach(el => {
      const rect = el.getBoundingClientRect();
      const elCenter = rect.top + rect.height / 2;
      const distance = Math.abs(elCenter - windowCenter);
      if (distance < minDistance) {
        minDistance = distance;
        nearestBlock = el;
      }
    });

    if (nearestBlock && minDistance > 5) {
      _isSnapping = true;
      nearestBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => { _isSnapping = false; }, 1000);
    }
  }, 500);
}, { passive: true });


(function init() {
  const savedTheme = _lsLoad(LS.THEME, 'dark');
  _applyTheme(savedTheme);

  settings.showApprox = _lsLoad(LS.SHOW_APPROX, false);
  settings.assumeReal = _lsLoad(LS.ASSUME_REAL, false);
  settings.useDegrees = _lsLoad(LS.USE_DEGREES, false);
  settings.precision  = _lsLoad(LS.PRECISION, 10);
  settings.stepsMode  = _lsLoad(LS.STEPS_MODE, 'off');

  // Load Notebook array
  let savedNotebook = _lsLoad(LS.INPUT, null);
  
  if (Array.isArray(savedNotebook) && savedNotebook.length > 0) {
    savedNotebook.forEach(b => {
      _createBlock(b.latex || '', b.approx || null, false);
    });
  } else if (typeof savedNotebook === 'string' && savedNotebook.length > 0) {
    // Migration path from single-string MVP
    _createBlock(savedNotebook, null, false);
  } else {
    // Brand new session
    _createBlock('', null, false);
  }

  setWorkerStatus('loading');
  
  // Focus the last block by default
  const lastId = blocks[blocks.length - 1].id;
  const lastTa = document.getElementById(`in-${lastId}`);
  if (lastTa) lastTa.focus();
})();

</script>
